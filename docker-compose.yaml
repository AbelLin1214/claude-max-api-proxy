services:
  claude-proxy:
    image: qqq47267758/claude-max-api-proxy:latest
    ports:
      - "${PORT:-3456}:3456"
    environment:
      - HOST=0.0.0.0
      - PORT=3456
      # Pick ONE authentication method:
      #
      # Option A — Console API key (pay-per-use):
      # - ANTHROPIC_API_KEY=sk-ant-xxx
      #
      # Option B — Claude Max/Pro OAuth token:
      # - CLAUDE_CODE_OAUTH_TOKEN=your-oauth-access-token
      # - CLAUDE_CODE_OAUTH_REFRESH_TOKEN=your-refresh-token  # optional
      #
      # Proxy API key (clients must send this to access the proxy):
      # - PROXY_API_KEY=your-secret-proxy-key
    restart: unless-stopped

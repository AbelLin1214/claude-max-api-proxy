name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          # Get previous tag
          PREV_TAG=$(git tag --sort=-v:refname | head -2 | tail -1)
          TAG=${GITHUB_REF#refs/tags/}

          if [ -z "$PREV_TAG" ] || [ "$PREV_TAG" = "$TAG" ]; then
            CHANGES=$(git log --pretty=format:"- %s" HEAD)
          else
            CHANGES=$(git log --pretty=format:"- %s" "${PREV_TAG}..${TAG}")
          fi

          # Write to file to handle multiline
          cat > /tmp/changelog.md <<EOF
          ## Docker

          \`\`\`bash
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/claude-max-api-proxy:${TAG#v}
          \`\`\`

          Or one-line install:

          \`\`\`bash
          curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/install.sh | bash -s -- --token YOUR_OAUTH_TOKEN
          \`\`\`

          ## Changes

          ${CHANGES}
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: /tmp/changelog.md
          generate_release_notes: false
